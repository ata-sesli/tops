name: Internal Tests

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  go-test-internal:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Internal Tests
        run: go test ./internal/...

